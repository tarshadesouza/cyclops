[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @cyclops/db run db:generate && pnpm exec turbo build --filter=@cyclops/api..."

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.preDeployCommand]
command = "pnpm --filter @cyclops/db run db:migrate"
