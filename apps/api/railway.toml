[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @cyclops/db run db:generate && pnpm exec turbo build --filter=@cyclops/api..."

[deploy]
startCommand = "node apps/api/start.mjs"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Migration runs at startup via startCommand wrapper
